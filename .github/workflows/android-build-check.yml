name: Android Build Check

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'apps/frontend/**'

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/frontend/**/*.gradle.kts', 'apps/frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # pull_request 이벤트에서는 Fork PR의 경우 시크릿 접근 불가
      # 시크릿이 없으면 더미 파일로 빌드 검증만 수행
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "⚠️ 시크릿 없음 — 더미 google-services.json 생성"
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.nomadclub.cashchat"
                  }
                },
                "api_key": [
                  { "current_key": "DUMMY_KEY_FOR_BUILD_CHECK" }
                ]
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000001",
                  "android_client_info": {
                    "package_name": "com.nomadclub.cashchat.dev"
                  }
                },
                "api_key": [
                  { "current_key": "DUMMY_KEY_FOR_BUILD_CHECK" }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK (검증용)
        run: ./gradlew :app:assembleDebug
