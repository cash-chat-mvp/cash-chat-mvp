name: Backend CI/CD

on:
  pull_request:
    branches:
      - dev
    paths:
      - "apps/backend/**"
      - "infra/deploy/backend/**"
      - ".github/workflows/backend-cicd.yml"
  push:
    branches:
      - dev
    paths:
      - "apps/backend/**"
      - "infra/deploy/backend/**"
      - ".github/workflows/backend-cicd.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

  cd:
    name: Backend CD
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cash-chat-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/cash-chat-backend:latest

      - name: Create deploy env file
        shell: bash
        env:
          BACKEND_SPRING_PROFILES_ACTIVE: ${{ secrets.BACKEND_SPRING_PROFILES_ACTIVE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          SPRING_PROFILE="${BACKEND_SPRING_PROFILES_ACTIVE}"
          if [ -z "${SPRING_PROFILE}" ]; then
            SPRING_PROFILE="prod"
          fi

          if [ "${SPRING_PROFILE}" = "prod" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY must be set when SPRING_PROFILES_ACTIVE=prod" >&2
            exit 1
          fi

          {
            echo "BACKEND_IMAGE=ghcr.io/${{ github.repository_owner }}/cash-chat-backend:latest"
            echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}"
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
          } > infra/deploy/backend/.deploy.env

      - name: Upload compose files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/deploy/backend/docker-compose.yml,infra/deploy/backend/.deploy.env"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 3

      - name: Deploy backend via Docker Compose
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -n "${GHCR_TOKEN}" ] && [ -n "${GHCR_USERNAME}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi

            docker compose --env-file .deploy.env -f docker-compose.yml pull
            docker compose --env-file .deploy.env -f docker-compose.yml up -d --remove-orphans
            docker compose -f docker-compose.yml ps

