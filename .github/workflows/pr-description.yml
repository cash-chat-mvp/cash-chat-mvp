name: PR Description Auto Fill

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 커밋 히스토리 가져오기

      - name: Get Commit List
        id: commits
        run: |
          # base 브랜치 대비 커밋 목록 추출
          COMMITS=$(git log origin/${{ github.base_ref }}..origin/${{ github.head_ref }} \
            --pretty=format:"- %s (%h)" 2>/dev/null || \
            git log --pretty=format:"- %s (%h)" -10)
          
          # 멀티라인 output 처리
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Extract Jira Issue Key
        id: extract
        run: |
          ISSUE_KEY=$(echo "${{ github.head_ref }} ${{ github.event.pull_request.title }}" \
            | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueKey = '${{ steps.extract.outputs.issue_key }}';
            const commits = `${{ steps.commits.outputs.commits }}`;
            const jiraUrl = issueKey 
              ? `https://moneyfactoryslave.atlassian.net/browse/${issueKey}` 
              : '없음';

            const body = `
            ## 📋 연관 Jira 티켓
            ${issueKey ? `[${issueKey}](${jiraUrl})` : '없음'}

            ## 📝 커밋 내역
            ${commits}

            ## ✅ 체크리스트
            - [ ] 코드 리뷰 요청 전 셀프 리뷰 완료
            - [ ] 테스트 확인
            - [ ] 불필요한 코드/주석 제거
            `;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body.trim()
            });
