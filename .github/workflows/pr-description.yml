name: PR Description Auto Fill

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Commit List
        id: commits
        run: |
          # --no-merges: 머지 커밋 제외
          # --first-parent: 브랜치 직접 커밋만 (딸려온 커밋 제외)
          COMMITS=$(git log origin/${{ github.base_ref }}..origin/${{ github.head_ref }} \
            --no-merges \
            --first-parent \
            --pretty=format:"- %s (%h)" 2>/dev/null || \
            git log --no-merges --pretty=format:"- %s (%h)" -10)

          # 커밋이 없는 경우 처리
          if [ -z "$COMMITS" ]; then
            COMMITS="- 커밋 내역 없음"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Extract Jira Issue Key
        id: extract
        run: |
          ISSUE_KEY=$(echo "${{ github.head_ref }} ${{ github.event.pull_request.title }}" \
            | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueKey = '${{ steps.extract.outputs.issue_key }}';
            const commits = `${{ steps.commits.outputs.commits }}`;
            const jiraUrl = issueKey
              ? `https://moneyfactoryslave.atlassian.net/browse/${issueKey}`
              : '없음';

            const body = `
