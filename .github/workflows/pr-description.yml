name: PR Description Auto Fill

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Commit List
        id: commits
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          COMMITS=$(git log "origin/${BASE_REF}..origin/${HEAD_REF}" \
            --no-merges \
            --first-parent \
            --pretty=format:"- %s (%h)" 2>/dev/null || \
            git log --no-merges --first-parent --pretty=format:"- %s (%h)" -10)

          if [ -z "$COMMITS" ]; then
            COMMITS="- 커밋 내역 없음"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Extract Jira Issue Key
        id: extract
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ISSUE_KEY=$(echo "${HEAD_REF} ${PR_TITLE}" \
            | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueKey = '${{ steps.extract.outputs.issue_key }}';
            const commits = `${{ steps.commits.outputs.commits }}`;
            const jiraUrl = issueKey
              ? `https://moneyfactoryslave.atlassian.net/browse/${issueKey}`
              : '없음';

            const checklist = [
              '- [ ] 코드 리뷰 요청 전 셀프 리뷰 완료',
              '- [ ] 테스트 확인',
              '- [ ] 불필요한 코드/주석 제거',
            ].join('\n');

            const body = [
              '## 📋 연관 Jira 티켓',
              issueKey ? `[${issueKey}](${jiraUrl})` : '없음',
              '',
              '## 📝 커밋 내역',
              commits,
              '',
              '## ✅ 체크리스트',
              checklist,
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body.trim()
            });
