name: Jira Due Date 알림

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 0시), 평일만
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: D-day/D-1/D-3 마감 이슈 조회 후 Discord 전송
        id: jira-check
        env:
          JIRA_AUTH: ${{ secrets.JIRA_AUTH }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JIRA_BASE_URL: "https://moneyfactoryslave.atlassian.net"
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          D1=$(date -u -d "+1 day" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          D3=$(date -u -d "+3 days" +%Y-%m-%d 2>/dev/null || date -u -v+3d +%Y-%m-%d)
          export TODAY D1 D3
          echo "오늘: $TODAY / D-1: $D1 / D-3: $D3"

          # ── Jira API 호출 (신규 엔드포인트: /search/jql) ──
          JQL="project=CC AND duedate in ($TODAY, $D1, $D3) AND statusCategory != Done ORDER BY duedate ASC"

          RESPONSE=$(curl -sS --fail-with-body \
            -H "Authorization: Basic $JIRA_AUTH" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 30 \
            --get \
            --data-urlencode "jql=$JQL" \
            --data-urlencode "fields=summary,assignee,duedate,status,priority" \
            "$JIRA_BASE_URL/rest/api/3/search/jql") || {
              echo "::error::Jira API 호출 실패"
              exit 1
            }

          echo "Jira 응답 수신 완료"

          echo "$RESPONSE" | python3 -c "
          import sys, json, urllib.request, urllib.error, os
          from datetime import datetime

          raw = sys.stdin.read()
          d = json.loads(raw)

          if 'errorMessages' in d or 'errors' in d:
              print('::error::Jira API 에러:', d)
              exit(1)

          if d.get('total', 0) == 0:
              print('마감 임박 이슈 없음 — 알림 생략')
              exit(0)

          TODAY = os.environ.get('TODAY', '')
          D1 = os.environ.get('D1', '')
          D3 = os.environ.get('D3', '')
          JIRA_BASE_URL = os.environ.get('JIRA_BASE_URL', '')

          # D-day별 색상 및 라벨
          def get_label_and_color(duedate):
              if duedate == TODAY:
                  return '🔴 오늘 마감!', 15158332   # 빨간색
              elif duedate == D1:
                  return '🟠 내일 마감 (D-1)', 15105570  # 주황색
              elif duedate == D3:
                  return '🟡 3일 후 마감 (D-3)', 16776960  # 노란색
              else:
                  return '⏰ 마감 임박', 15548997

          # 우선순위 이모지
          priority_emoji = {
              'Highest': '🔴', 'High': '🟠', 'Medium': '🟡',
              'Low': '🟢', 'Lowest': '⚪'
          }

          embeds = []
          for issue in d['issues']:
              f = issue['fields']
              assignee = f['assignee']['displayName'] if f.get('assignee') else '미배정'
              status = f['status']['name'] if f.get('status') else '알 수 없음'
              duedate = f.get('duedate', '알 수 없음')
              priority_name = f.get('priority', {}).get('name', '') if f.get('priority') else ''
              p_emoji = priority_emoji.get(priority_name, '⚪')

              key = issue['key']
              url = f'{JIRA_BASE_URL}/browse/{key}'
              label, color = get_label_and_color(duedate)

              embeds.append({
                  'color': color,
                  'title': label,
                  'url': url,
                  'description': f'**[{key}] {f[\"summary\"]}**',
                  'fields': [
                      {'name': '담당자',   'value': f'\`{assignee}\`',    'inline': True},
                      {'name': '마감일',   'value': f'\`{duedate}\`',     'inline': True},
                      {'name': '상태',     'value': f'\`{status}\`',      'inline': True},
                      {'name': '우선순위', 'value': f'{p_emoji} {priority_name}', 'inline': True},
                  ],
                  'footer': {'text': 'Cash Chat · Jira 자동 알림'},
              })

          # Discord embed 제한: 최대 10개
          if len(embeds) > 10:
              overflow = len(embeds) - 9
              embeds = embeds[:9]
              embeds.append({
                  'color': 5814783,
                  'description': f'...외 **{overflow}개** 이슈가 더 있어요. Jira에서 확인해 주세요!',
              })

          # D-day별 카운트 요약
          counts = {}
          for issue in d['issues']:
              dd = issue['fields'].get('duedate', '')
              lbl, _ = get_label_and_color(dd)
              counts[lbl] = counts.get(lbl, 0) + 1
          summary_parts = [f'{lbl}: {cnt}개' for lbl, cnt in counts.items()]
          summary = ' / '.join(summary_parts)

          payload = json.dumps({
              'content': f'> 📋  **마감 임박 이슈 {d[\"total\"]}건**  ({summary})',
              'embeds': embeds
          })

          webhook_url = os.environ.get('DISCORD_WEBHOOK', '')
          req = urllib.request.Request(
              webhook_url,
              data=payload.encode(),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  if resp.status < 200 or resp.status >= 300:
                      raise RuntimeError(f'Discord webhook 실패: HTTP {resp.status}')
              print(f'Discord 알림 전송 완료 (이슈 {d[\"total\"]}건)')
          except urllib.error.URLError as e:
              print(f'::error::Discord 전송 실패: {e}')
              exit(1)
          "

      # 위 step이 실패하면 실행됨
      - name: 워크플로우 실패 알림
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "ℹ️ DISCORD_WEBHOOK 없음 — 알림 건너뜀"
            exit 0
          fi
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "color": 15158332,
                "title": "🚨  워크플로우 실패",
                "description": "**Jira Due Date 알림 워크플로우가 실패했어요**",
                "fields": [
                  {"name": "워크플로우", "value": "`jira-duedate-discord.yml`", "inline": true},
                  {"name": "실행자", "value": "`${{ github.actor }}`", "inline": true},
                  {"name": "로그 확인", "value": "[Actions 로그 바로가기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "Cash Chat · GitHub Actions"}
              }]
            }'
