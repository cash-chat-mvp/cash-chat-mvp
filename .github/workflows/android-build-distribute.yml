name: Android Build & Distribute

on:
  # release-fe 브랜치에 push될 때 배포 — 버전은 자동 채번
  push:
    branches:
      - 'release-fe'

jobs:
  build-and-distribute:
    if: github.repository == 'cash-chat-mvp/cash-chat-mvp'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/frontend

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/frontend/**/*.gradle.kts', 'apps/frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > cashchat-release.keystore

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Write Firebase Service Account
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$FIREBASE_SA" > service-account.json

      - name: Auto-bump version tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # PR 라벨 기준: feature → minor, major → major, 나머지 → patch
          default_bump: patch
          tag_prefix: v

      # versionName: 1.0.1 형태 (v 제거)
      # versionCode: major*10000 + minor*100 + patch (단조 증가 보장, 리셋 위험 없음)
      - name: Set version outputs
        id: ver
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=${{ steps.version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          echo "✅ versionName=$VERSION / versionCode=$VERSION_CODE"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Fastlane distribute
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/apps/frontend/cashchat-release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ steps.ver.outputs.code }}
          RELEASE_NOTES: |
            ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}
        run: bundle exec fastlane android distribute

      - name: Find APK path
        id: apk
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/dev/release -name "*.apk" -print -quit)
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "::error::APK를 찾지 못했습니다: app/build/outputs/apk/dev/release"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: GitHub Release 생성 및 APK 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          # release-drafter가 draft로 쌓아둔 노트를 그대로 사용
          # draft가 없으면 GitHub이 PR 목록 기반으로 자동 생성
          generate_release_notes: true
          files: apps/frontend/${{ steps.apk.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord 배포 성공 알림
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DEPLOY_BOT_DISCORD }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ steps.ver.outputs.code }}
          VERSION_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "ℹ️ DISCORD_WEBHOOK 없음 — 알림 건너뜀"
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${VERSION_TAG}"
          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MESSAGE" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg ts "$TIMESTAMP" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg release_url "$RELEASE_URL" \
            --arg version "v${VERSION_NAME} (build ${VERSION_CODE})" \
            '{embeds: [{
              color: 5763719,
              title: "✅  Android 배포 완료",
              description: "**Firebase App Distribution + GitHub Release 배포 성공**",
              fields: [
                {name: "버전", value: ("`" + $version + "`"), inline: true},
                {name: "배포자", value: ("`" + $actor + "`"), inline: true},
                {name: "커밋", value: ("[`" + $sha + "`](" + $commit_url + ")"), inline: true},
                {name: "커밋 메시지", value: ("`" + $msg + "`"), inline: false},
                {name: "GitHub Release", value: ("[APK 다운로드](" + $release_url + ")"), inline: false}
              ],
              footer: {text: "Cash Chat · Android Build"},
              timestamp: $ts
            }]}')
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Discord 배포 실패 알림
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DEPLOY_BOT_DISCORD }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "ℹ️ DISCORD_WEBHOOK 없음 — 알림 건너뜀"
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"
          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MESSAGE" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            '{embeds: [{
              color: 15548997,
              title: "🚨  Android 빌드/배포 실패",
              description: "**release-fe 브랜치 빌드 또는 배포가 실패했어요**",
              fields: [
                {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                {name: "실패자", value: ("`" + $actor + "`"), inline: true},
                {name: "커밋", value: ("[`" + $sha + "`](" + $commit_url + ")"), inline: true},
                {name: "커밋 메시지", value: ("`" + $msg + "`"), inline: false},
                {name: "로그 확인", value: ("[Actions 로그 바로가기](" + $run_url + ")"), inline: false}
              ],
              footer: {text: "Cash Chat · Android Build"}
            }]}')
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
