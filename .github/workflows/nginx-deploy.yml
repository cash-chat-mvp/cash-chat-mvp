name: Nginx Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "infra/deploy/nginx/**"
      - ".github/workflows/nginx-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nginx-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'cash-chat-mvp/cash-chat-mvp'
    runs-on: ubuntu-latest
    env:
      NGINX_DEPLOY_PATH: ${{ vars.NGINX_DEPLOY_PATH }}
      NGINX_DOMAIN: ${{ vars.NGINX_DOMAIN }}
      NGINX_LE_EMAIL: ${{ vars.NGINX_LE_EMAIL }}
      NGINX_BACKEND_HOST: ${{ vars.NGINX_BACKEND_HOST }}
      NGINX_BACKEND_PORT: ${{ vars.NGINX_BACKEND_PORT }}
      NGINX_ENABLE_WWW: ${{ vars.NGINX_ENABLE_WWW }}
      NGINX_CERTBOT_STAGING: ${{ vars.NGINX_CERTBOT_STAGING }}
      NGINX_SKIP_CERTBOT: ${{ vars.NGINX_SKIP_CERTBOT }}
      NGINX_FORCE_RENEWAL: ${{ vars.NGINX_FORCE_RENEWAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required variables
        shell: bash
        run: |
          : "${NGINX_DEPLOY_PATH:?NGINX_DEPLOY_PATH is required}"
          : "${NGINX_DOMAIN:?NGINX_DOMAIN is required}"
          : "${NGINX_LE_EMAIL:?NGINX_LE_EMAIL is required}"

      - name: Upload nginx deploy assets
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/deploy/nginx/*"
          target: ${{ vars.NGINX_DEPLOY_PATH }}
          strip_components: 3
          overwrite: true

      - name: Run nginx ssl setup
        uses: appleboy/ssh-action@v1.2.5
        env:
          NGINX_DEPLOY_PATH: ${{ vars.NGINX_DEPLOY_PATH }}
          NGINX_DOMAIN: ${{ vars.NGINX_DOMAIN }}
          NGINX_LE_EMAIL: ${{ vars.NGINX_LE_EMAIL }}
          NGINX_BACKEND_HOST: ${{ vars.NGINX_BACKEND_HOST }}
          NGINX_BACKEND_PORT: ${{ vars.NGINX_BACKEND_PORT }}
          NGINX_ENABLE_WWW: ${{ vars.NGINX_ENABLE_WWW }}
          NGINX_CERTBOT_STAGING: ${{ vars.NGINX_CERTBOT_STAGING }}
          NGINX_SKIP_CERTBOT: ${{ vars.NGINX_SKIP_CERTBOT }}
          NGINX_FORCE_RENEWAL: ${{ vars.NGINX_FORCE_RENEWAL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NGINX_DEPLOY_PATH,NGINX_DOMAIN,NGINX_LE_EMAIL,NGINX_BACKEND_HOST,NGINX_BACKEND_PORT,NGINX_ENABLE_WWW,NGINX_CERTBOT_STAGING,NGINX_SKIP_CERTBOT,NGINX_FORCE_RENEWAL
          script: |
            set -euo pipefail
            cd "${NGINX_DEPLOY_PATH}"
            chmod +x setup-nginx-ssl.sh

            ARGS=(
              --domain "${NGINX_DOMAIN}"
              --email "${NGINX_LE_EMAIL}"
              --backend-host "${NGINX_BACKEND_HOST:-host.docker.internal}"
              --backend-port "${NGINX_BACKEND_PORT:-8080}"
            )

            if [ "${NGINX_ENABLE_WWW:-false}" = "true" ]; then
              ARGS+=(--enable-www)
            fi
            if [ "${NGINX_CERTBOT_STAGING:-false}" = "true" ]; then
              ARGS+=(--staging)
            fi
            if [ "${NGINX_SKIP_CERTBOT:-false}" = "true" ]; then
              ARGS+=(--skip-certbot)
            fi
            if [ "${NGINX_FORCE_RENEWAL:-false}" = "true" ]; then
              ARGS+=(--force-renewal)
            fi

            sudo ./setup-nginx-ssl.sh "${ARGS[@]}"
