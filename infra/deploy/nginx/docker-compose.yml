services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cash-chat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    command: >
      /bin/sh -c "while :; do
      sleep 21600 & wait $${!};
      nginx -s reload;
      done &
      nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: cash-chat-certbot
    restart: unless-stopped
    volumes:
      - ./certbot-www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 43200 & wait $${!};
      done"
