spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          max-tokens: 1024
          temperature: 0.7

# O-Auth: 운영용 클라이언트 (Google Cloud Console에서 별도 생성)
oauth:
  registration:
    google-app:
      provider: google
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: https://api.cashchat.kr/api/auth/callback/google
